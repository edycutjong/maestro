<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maestro — Constellation Orchestrator</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #1e293b;
      --text: #f8fafc;
      --accent: #06b6d4;
      --success: #10b981;
      --warning: #f59e0b;
      --error: #ef4444;
      --border: #334155;
    }
    body {
      margin: 0;
      padding: 2rem;
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
    }
    h1 {
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--accent);
      margin-bottom: 0.5rem;
    }
    .subtitle {
      color: #94a3b8;
      margin-bottom: 2rem;
    }
    .graph-container {
      display: flex;
      gap: 2rem;
      align-items: center;
      margin-bottom: 3rem;
      padding: 2rem;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow-x: auto;
    }
    .node {
      min-width: 150px;
      padding: 1rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      text-align: center;
      position: relative;
    }
    .node.active {
      border-color: var(--accent);
      box-shadow: 0 0 15px rgba(6, 182, 212, 0.3);
    }
    .node.success {
      border-color: var(--success);
      box-shadow: 0 0 15px rgba(16, 185, 129, 0.3);
    }
    .node-title {
      font-weight: bold;
      margin-bottom: 0.5rem;
    }
    .node-status {
      font-size: 0.8rem;
      color: #94a3b8;
    }
    .arrow {
      color: var(--border);
      font-size: 1.5rem;
    }
    .trace-log {
      background: var(--panel);
      padding: 1rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      height: 300px;
      overflow-y: auto;
      font-size: 0.9rem;
    }
    .trace-entry {
      margin-bottom: 0.5rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px dashed var(--border);
    }
    .trace-time { color: #64748b; }
    .trace-agent { color: var(--accent); font-weight: bold; }
  </style>
</head>
<body>
  <h1>Maestro Orchestrator</h1>
  <div class="subtitle">Live CROO Agent Constellation Trace</div>

  <div class="graph-container" id="graph">
    <!-- Stubbed nodes -->
    <div class="node">
      <div class="node-title">Maestro</div>
      <div class="node-status">Pending</div>
    </div>
    <div class="arrow">→</div>
    <div class="node">
      <div class="node-title">Worker</div>
      <div class="node-status">Pending</div>
    </div>
    <div class="arrow">→</div>
    <div class="node">
      <div class="node-title">Litmus</div>
      <div class="node-status">Pending</div>
    </div>
    <div class="arrow">→</div>
    <div class="node">
      <div class="node-title">Summon</div>
      <div class="node-status">Pending</div>
    </div>
  </div>

  <h2>Trace Log</h2>
  <div class="trace-log" id="trace">
    <div class="trace-entry">
      <span class="trace-time">[00:00:00]</span> 
      <span class="trace-agent">Maestro</span>: Initializing...
    </div>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const orderId = urlParams.get('orderId');
    const traceContainer = document.getElementById('trace');
    const nodes = {
      Maestro: document.querySelector('.node:nth-child(1)'),
      Worker: document.querySelector('.node:nth-child(3)'),
      Litmus: document.querySelector('.node:nth-child(5)'),
      Summon: document.querySelector('.node:nth-child(7)'),
    };

    if (!orderId) {
      traceContainer.innerHTML = '<div class="trace-entry" style="color: var(--error);">Error: No orderId provided in query string (e.g. ?orderId=mock_order_1)</div>';
    } else {
      let seenEvents = 0;
      async function poll() {
        try {
          const res = await fetch(`/trace?orderId=${encodeURIComponent(orderId)}`);
          if (!res.ok) return;
          const trace = await res.json();
          
          if (trace.length > 0) {
            traceContainer.innerHTML = '';
          } else {
            traceContainer.innerHTML = '<div class="trace-entry" style="color: #64748b;">No traces logged yet for this order.</div>';
          }
          
          // Render each event
          trace.forEach(event => {
            const time = new Date(event.timestamp).toLocaleTimeString();
            const entry = document.createElement('div');
            entry.className = 'trace-entry';
            entry.innerHTML = `
              <span class="trace-time">[${time}]</span> 
              <span class="trace-agent">${event.agent}</span>: 
              <span style="color: #cbd5e1">${event.type}</span> 
              <span style="color: #64748b">${event.data ? JSON.stringify(event.data) : ''}</span>
            `;
            traceContainer.appendChild(entry);
          });

          // Auto-scroll trace log to bottom if new events arrived
          if (trace.length > seenEvents) {
            traceContainer.scrollTop = traceContainer.scrollHeight;
            seenEvents = trace.length;
          }

          // Reset all nodes to pending
          Object.values(nodes).forEach(n => {
            if (n) {
              n.classList.remove('active', 'success');
              const statusEl = n.querySelector('.node-status');
              if (statusEl) statusEl.textContent = 'Pending';
            }
          });

          // Active/Success based on trace history
          trace.forEach(event => {
            let agentName = event.agent;
            if (agentName.startsWith('Worker') || agentName.startsWith('FallbackWorker')) agentName = 'Worker';
            if (agentName.startsWith('Litmus')) agentName = 'Litmus';
            if (agentName.startsWith('Summon')) agentName = 'Summon';

            const node = nodes[agentName];
            if (node) {
              const statusEl = node.querySelector('.node-status');
              if (event.type === 'hire_start' || event.type === 'hire_attempt' || event.type === 'negotiate_start') {
                node.classList.add('active');
                if (statusEl) statusEl.textContent = 'In Progress';
              } else if (event.type === 'hire_delivered' || event.type === 'completed' || event.type === 'pipeline_done' || event.type === 'pipeline_start' || event.type === 'pipeline_resume') {
                node.classList.add('success');
                if (statusEl) statusEl.textContent = 'Completed';
              }
            }
          });

          // Maestro remains active or success if pipeline is running or complete
          const hasDone = trace.some(e => e.type === 'pipeline_done');
          const hasStart = trace.some(e => e.type === 'pipeline_start' || e.type === 'pipeline_resume');
          if (nodes.Maestro) {
            const statusEl = nodes.Maestro.querySelector('.node-status');
            if (hasDone) {
              nodes.Maestro.classList.add('success');
              if (statusEl) statusEl.textContent = 'Completed';
            } else if (hasStart) {
              nodes.Maestro.classList.add('active');
              if (statusEl) statusEl.textContent = 'Orchestrating';
            }
          }

        } catch (err) {
          console.error('Error polling trace log:', err);
        }
      }

      // Poll every 1000ms
      setInterval(poll, 1000);
      poll();
    }
  </script>
</body>
</html>
